{% extends "!layout.html" %}

{% block extrabody %}
{{ super() }}
<div id="language-bar">
    Language:
    <a href="#" id="translate-link" target="_blank">English</a> |
    <a href="#" id="original-link">日本語</a>
</div>
{% endblock %}

{% block extrahead %}
{{ super() }}
<style>
    #language-bar {
        position: sticky;
        top: 0;
        z-index: 1000;
        width: 100%;
        background: #f8f9fa;
        padding: 8px 16px;
        border-bottom: 1px solid #ddd;
        font-family: inherit;
        font-size: 100%;
    }

    #language-bar a {
        margin: 0 8px;
        text-decoration: none;
        color: #2980b9;
    }

    #language-bar a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block footer %}
{{ super() }}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const currentUrl = window.location.href;
        const isTranslated = currentUrl.includes(".translate.goog");
        const translateUrl = "https://translate.google.com/translate?sl=ja&tl=en&u=" + encodeURIComponent(currentUrl);

        const translateLink = document.getElementById("translate-link");
        const originalLink = document.getElementById("original-link");

        // 英語リンク設定
        translateLink.href = translateUrl;

        if (isTranslated) {
            // Google翻訳ラッパー上 → 元の日本語ページを別タブで開く
            const originalUrl = currentUrl.replace(/^https:\/\/[^/]+\.translate\.goog/, "https://is-isee.github.io");
            originalLink.href = originalUrl;
            originalLink.target = "_blank";
            originalLink.rel = "noopener";
        } else {
            // 通常ページ上 → リロード扱い
            originalLink.href = currentUrl;
            originalLink.target = "_self";
        }
    });
</script>
{% endblock %}
