{% extends "!layout.html" %}

{% block content %}
<div id="language-bar">
    Language:
    <a href="#" id="translate-link" target="_blank">English</a> |
    <a href="#" id="original-link"
        onclick="window.top.location.href = window.location.origin + window.location.pathname; return false;">日本語</a>
</div>
{{ super() }}
{% endblock %}

{% block extrahead %}
{{ super() }}
<style>
    /* custom.css にある #language-switch の影響を打ち消す */
    #language-switch {
        all: unset;
    }

    /* ページ上部バーの新しいスタイル */
    #language-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        width: 100%;
        background: var(--bg-color, #fff);
        border-bottom: 1px solid #ddd;
        padding: 0.6em 1.2em;
        font-size: inherit;
        /* 本文と同じフォントサイズ */
        font-family: inherit;
        /* 本文と同じフォント */
    }

    #language-bar a {
        color: var(--link-color, #007acc);
        text-decoration: none;
        margin: 0 8px;
    }

    #language-bar a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block footer %}
{{ super() }}
<script>
    const currentUrl = window.location.href;
    const encodedUrl = encodeURIComponent(currentUrl);
    const translateUrl = "https://translate.google.com/translate?sl=ja&tl=en&u=" + encodedUrl;
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("translate-link").href = translateUrl;
    });
</script>
{% endblock %}
