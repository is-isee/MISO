{% extends "!layout.html" %}

{% block content %}
<div id="language-links" style="margin-bottom: 1em; font-size: 100%;">
    Language:
    <a href="#" id="translate-link" target="_blank">English</a> |
    <a href="#" id="original-link">日本語</a>
</div>

{{ super() }}
{% endblock %}

{% block footer %}
{{ super() }}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const currentUrl = window.location.href;
        const isTranslated = currentUrl.includes(".translate.goog");
        const translateLink = document.getElementById("translate-link");
        const originalLink = document.getElementById("original-link");

        // 翻訳URLを生成
        const translateUrl =
            "https://translate.google.com/translate?sl=ja&tl=en&u=" +
            encodeURIComponent(currentUrl);

        if (isTranslated) {
            // --- 英語版(.translate.goog)にいる場合 ---
            // English → ページを単にリロード
            translateLink.removeAttribute("target");
            translateLink.removeAttribute("href");
            translateLink.addEventListener("click", (e) => {
                e.preventDefault();
                window.location.reload();
            });

            // 日本語 → 新タブで元URLを開く（翻訳解除）
            const originalUrl = currentUrl.replace(
                /^https:\/\/[^/]+\.translate\.goog/,
                "https://1-is.isee.github.io"
            );
            originalLink.href = originalUrl;
            originalLink.target = "_blank";
            originalLink.rel = "noopener";
        } else {
            // --- 日本語版にいる場合 ---
            translateLink.href = translateUrl;
            translateLink.target = "_blank";

            originalLink.href = currentUrl;
            originalLink.target = "_self";
        }
    });
</script>
{% endblock %}
