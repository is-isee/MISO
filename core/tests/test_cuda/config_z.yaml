base:
  save_dir: data/
  # if save_dir exiests
  # continue: true -> continue simulation
  # continue: false -> start from scratch
  continue: true

time:
  time_save_dir: time/
  tend: 0.8
  dt_output: 0.01
  n_output_digits: 8

grid:
  i_size: 3
  j_size: 4
  k_size: 5
  margin: 2
  xmin: 0.0
  xmax: 1.0
  ymin: 0.0
  ymax: 2.0
  zmin: 0.0
  zmax: 3.0

mpi:
  mpi_save_dir: mpi/
  n_procs_digits: 8
  x_procs: 1
  y_procs: 1
  z_procs: 2

mhd:
  mhd_save_dir: mhd/

eos:
  gm: 1.6666666666666667

time_integrator:
  cfl_number: 0.5

artificial_viscosity:
  ep: 1.5
  fh: 1.0
  # for characteristic velocity
  cs_fac: 0.5
  ca_fac: 1.0
  vv_fac: 1.0
boundary_condition:
  # please use "standard" or "custom" for boundary_type
  boundary_type: standard

  periodic:
    x: false
    y: false
    z: false

  ro:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vx:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vy:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vz:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  bx:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  by:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  bz:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  ei:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  ph:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]
