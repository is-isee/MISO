base:
  save_dir: data/
  # if save_dir exiests
  # continue: true -> continue simulation
  # continue: false -> start from scratch
  continue: true

time:
  time_save_dir: time/
  n_output_digits: 8
  tend: 2.0
  dt_output: 0.02

grid:
  i_size: 512
  j_size: 512
  k_size: 1
  margin: 2
  x_min: -0.5
  x_max:  0.5
  y_min: -0.5
  y_max:  0.5
  z_min: -0.5
  z_max:  0.5

mpi:
  mpi_save_dir: mpi/
  x_procs: 2
  y_procs: 1
  z_procs: 1

domain:
  periodic:
    x: true
    y: false
    z: true

mhd:
  mhd_save_dir: mhd/
  n_output_digits: 8
  cfl_number: 1.0
  artificial_viscosity:
    ep: 1.5
    fh: 1.5
    # for characteristic velocity
    cs_fac: 0.5
    ca_fac: 1.0
    vv_fac: 1.0

eos:
  gm: 1.4

kelvin_helmholtz:
  v_amp: 1.e-3
  pr: 2.5
  ro_upper: 1.0
  ro_lower: 2.0
