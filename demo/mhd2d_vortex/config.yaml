base:
  save_dir: data/
  # if save_dir exiests
  # continue: true -> continue simulation
  # continue: false -> start from scratch
  continue: false

time:
  time_save_dir: time/
  tend: 0.8
  dt_output: 0.01
  n_output_digits: 8

grid:
  i_size: 128
  j_size: 128
  k_size: 1
  margin: 2
  xmin: 0.0
  xmax: 1.0
  ymin: 0.0
  ymax: 1.0
  zmin: 0.0
  zmax: 1.0

mpi:
  mpi_save_dir: mpi/
  n_procs_digits: 8
  x_procs: 2
  y_procs: 1
  z_procs: 1

mhd:
  mhd_save_dir: mhd/

eos:
  gm: 1.6666666666666667

time_integrator:
  cfl_number: 1.0

artificial_viscosity:
  ep: 1.5
  fh: 1.0
  # for characteristic velocity
  cs_fac: 0.8
  ca_fac: 0.8
  vv_fac: 0.8

domain:
  periodic:
    x: true
    y: true
    z: true
