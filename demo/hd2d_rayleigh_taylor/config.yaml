base:
  save_dir: data/
  # if save_dir exiests
  # continue: true -> continue simulation
  # continue: false -> start from scratch
  continue: true

time:
  time_save_dir: time/
  n_output_digits: 8
  tend: 20.0
  dt_output: 0.2

grid:
  i_size: 128
  j_size: 128
  k_size: 1
  margin: 2
  x_min: -0.25
  x_max:  0.25
  y_min: -0.75
  y_max:  0.75
  z_min: -0.25
  z_max:  0.25

mpi:
  mpi_save_dir: mpi/
  x_procs: 1
  y_procs: 2
  z_procs: 1


domain:
  periodic:
    x: true
    y: false
    z: true

mhd:
  mhd_save_dir: mhd/
  n_output_digits: 8
  cfl_number: 0.5
  artificial_viscosity:
    ep: 2.0
    fh: 2.0
    # for characteristic velocity
    cs_fac: 0.5
    ca_fac: 1.0
    vv_fac: 1.0

eos:
  gm: 1.4

rayleigh_taylor:
  v_amp: 1.e-3
  pr0: 2.5
  ro_upper: 2.0
  ro_lower: 1.0
  g_grav: 0.1
