name: Deploy Pages
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install ".[docs]"
      - name: Build documentation
        run: make -C docs html

      - name: Deploy main to gh-pages/
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages
          keep_files: true
          disable_nojekyll: false

      # Preview: https://is-isee.github.io/MISO/pr-${pr}/
      - name: Deploy PR preview to gh-pages/pr-<num>/
        if: github.event_name == 'pull_request'
          && github.event.action != 'closed'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
          publish_branch: gh-pages
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
          disable_nojekyll: false

  cleanup-preview:
    if: github.event_name == 'pull_request'
        && github.event.action == 'closed'
        && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          rm -rf "pr-${PR_NUM}"
          echo "Removed pr-${PR_NUM} (if it existed)."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep .; then
            git add -A
            git commit -m "Remove docs preview for PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No changes to commit."
          fi
