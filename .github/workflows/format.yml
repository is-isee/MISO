name: Formatter

on: [push]

jobs:
  run-cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check format of C++ files (includes .cu/.cuh)
        run: |
          files=$(find . -name "*.cpp" -o -name "*.hpp" -o -name "*.cu" -o -name "*.cuh")
          clang-format --dry-run --Werror $files
