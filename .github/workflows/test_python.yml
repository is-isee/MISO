name: Run tests of Python

on: [push]

jobs:
  run-cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Check format
        run: |
          ruff check pyMISO
      - name: Lint code
        run: |
          ruff format pyMISO --check
