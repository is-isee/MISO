base:
  save_dir: data/
  # if save_dir exists
  # continue: true -> continue simulation
  # continue: false -> start from scratch
  continue: true

time:
  time_save_dir: time/
  tend: 2500.0
  dt_output: 5.0
  n_output_digits: 8

grid:
  i_size: 128
  j_size: 128
  k_size: 128
  margin: 2
  xmin: -44.8
  xmax:  44.8
  ymin: -44.8
  ymax:  44.8
  zmin: -44.8
  zmax:  44.8

mpi:
  mpi_save_dir: mpi/
  n_procs_digits: 8
  x_procs: 2
  y_procs: 1
  z_procs: 1

mhd:
  mhd_save_dir: mhd/

eos:
  gm: 1.6666666666666667

time_integrator:
  cfl_number: 0.8

artificial_viscosity:
  ep: 1.5
  fh: 1.5
  # for characteristic velocity
  cs_fac: 0.8
  ca_fac: 0.8
  vv_fac: 0.8
boundary_condition:
  # please use "standard" or "custom" for boundary_type
  boundary_type: custom

  periodic:
    x: false
    y: false
    z: false

  ro:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vx:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vy:
    x: [antisymmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  vz:
    x: [antisymmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  bx:
    x: [antisymmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  by:
    x: [antisymmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  bz:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  ei:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

  ph:
    x: [symmetric, symmetric]
    y: [symmetric, symmetric]
    z: [symmetric, symmetric]

solar_wind: # solar wind parameter at x = xmin boundary
  ro_sw: 5.e-5
  pr_sw: 3.56e-8
  vx_sw: 0.1
  bz_imf: 1.5e-4

geo_boundary:
  pr_earth: 5.4e-7
  radius: 3.5
  a0: 100.0

floor:
  ro_floor: 1.e-8
  pr_floor: 1.e-10

    
